version: "3.9"

services:
  # ── Streamlit interactive dashboard ────────────────────────────────────────
  streamlit:
    build:
      context: .
      target: streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - CHURN_MODEL_PATH=/app/models/best_model.joblib
    restart: unless-stopped

  # ── FastAPI REST service ────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - CHURN_MODEL_PATH=/app/models/best_model.joblib
    restart: unless-stopped
    depends_on:
      - streamlit
